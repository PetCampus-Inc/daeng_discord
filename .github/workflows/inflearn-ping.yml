name: inflearn-ping

on:
  schedule:
    # Every 4 hours. Cron is UTC; KST = UTC + 9.
    - cron: "0 */4 * * *"
  workflow_dispatch:

concurrency:
  group: inflearn-session
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Restore Inflearn session
        run: |
          mkdir -p scripts/inflearn
          echo "${{ secrets.INFLEARN_STATE_B64 }}" | base64 -d > scripts/inflearn/state.json
          test -s scripts/inflearn/state.json

      - name: Refresh session
        run: node scripts/inflearn/ping.js

      - name: Upload debug screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inflearn-ping-debug-${{ github.run_id }}
          path: /tmp/inflearn-ping-debug
          if-no-files-found: ignore
          retention-days: 3

      - name: Rotate INFLEARN_STATE_B64 secret with refreshed cookies
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "GH_PAT 가 없어서 secret 갱신을 건너뜁니다."
            exit 0
          fi
          node - scripts/inflearn/state.json /tmp/inflearn-state-compact.json <<'NODE'
          const fs = require("fs");
          const [, , input, output] = process.argv;
          const state = JSON.parse(fs.readFileSync(input, "utf8"));
          const compact = {
            cookies: (state.cookies || []).filter((cookie) =>
              String(cookie.domain || "").includes("inflearn.com")
            ),
            origins: (state.origins || [])
              .filter((origin) => {
                try {
                  return new URL(origin.origin).hostname.endsWith("inflearn.com");
                } catch (_) {
                  return false;
                }
              })
              .map((origin) => ({
                origin: origin.origin,
                localStorage: (origin.localStorage || []).filter(
                  (item) => !String(item.name || "").startsWith("hackle-workspace-config_")
                ),
                indexedDB: origin.indexedDB || [],
              })),
          };
          fs.writeFileSync(output, JSON.stringify(compact));
          NODE
          NEW=$(base64 -w0 /tmp/inflearn-state-compact.json)
          echo -n "$NEW" | gh secret set INFLEARN_STATE_B64 --repo "${{ github.repository }}"
          echo "INFLEARN_STATE_B64 갱신 완료"

      - name: Discord alert on failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK" ]; then exit 0; fi
          curl -s -X POST "$WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n --arg msg "⚠️ Inflearn 세션 ping 실패 — 'npm run inflearn:login' 재로그인 후 INFLEARN_STATE_B64 재업로드 필요. 로그: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" '{content: $msg}')"
