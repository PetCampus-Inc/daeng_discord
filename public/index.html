<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knockdog Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #fef9f3 0%, #fff5eb 100%);
      min-height: 100vh;
      color: #2d3748;
      padding: 24px;
      overflow-x: hidden;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header-top-info {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 12px;
      font-size: 0.9rem;
      color: #64748b;
    }

    .current-datetime {
      font-family: 'Courier New', monospace;
      font-weight: 600;
      color: #475569;
      background: #fff;
      padding: 6px 14px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .visitor-count {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      padding: 6px 14px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(245, 158, 11, 0.15);
    }

    .visitor-count strong {
      color: #ea580c;
      font-size: 1rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f59e0b, #ea580c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 0.85rem;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      color: #64748b;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #cbd5e1;
    }

    .status-dot.connected {
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.4);
    }

    .week-nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .week-nav button {
      padding: 10px 20px;
      border: none;
      border-radius: 12px;
      background: #fff;
      color: #64748b;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: all 0.2s;
    }

    .week-nav button:hover {
      background: #f59e0b;
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
    }

    .week-nav button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .week-label {
      font-size: 1.1rem;
      font-weight: 600;
      color: #475569;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .stat-card {
      background: #fff;
      border: none;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #1e293b;
    }

    .stat-value.green { color: #22c55e; }
    .stat-value.red { color: #ef4444; }

    .stat-label {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-top: 6px;
      font-weight: 500;
    }

    .chart-container {
      background: #fff;
      border: none;
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 32px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }

    .chart-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: #475569;
    }

    .chart-wrapper {
      position: relative;
      height: 250px;
    }

    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 20px;
    }

    @media (max-width: 768px) {
      .members-grid {
        grid-template-columns: 1fr;
      }
    }

    .member-section {
      margin-top: 40px;
    }

    .section-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 20px;
      padding-left: 14px;
      border-left: 4px solid #e2e8f0;
      color: #475569;
    }

    .section-title.core-title {
      border-left-color: #22c55e;
      color: #16a34a;
    }

    .section-title.contributor-title {
      border-left-color: #3b82f6;
      color: #2563eb;
    }

    .member-card {
      background: #fff;
      border: none;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .member-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }

    .member-card.met {
      border-left: 4px solid #22c55e;
    }

    .member-card.not-met {
      border-left: 4px solid #ef4444;
    }

    .member-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .member-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #f1f5f9;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .member-info h3 {
      font-size: 1rem;
      font-weight: 600;
      color: #1e293b;
    }

    .member-info span {
      font-size: 0.8rem;
      color: #94a3b8;
    }

    .progress-container {
      margin-bottom: 18px;
    }

    .progress-bar {
      height: 8px;
      background: #f1f5f9;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .progress-fill.complete {
      background: linear-gradient(90deg, #22c55e, #16a34a);
    }

    .progress-fill.incomplete {
      background: linear-gradient(90deg, #f87171, #ef4444);
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.85rem;
      color: #64748b;
      font-weight: 500;
    }

    .week-schedule {
      margin-top: 14px;
    }

    .schedule-table {
      width: 100%;
      border-collapse: collapse;
    }

    .schedule-table th {
      font-size: 0.75rem;
      font-weight: 600;
      color: #94a3b8;
      padding: 8px 4px;
      text-align: center;
      border-bottom: 2px solid #f1f5f9;
    }

    .schedule-table td {
      padding: 8px 4px;
      text-align: center;
      vertical-align: top;
    }

    .day-cell {
      background: #f8fafc;
      border-radius: 10px;
      padding: 10px 4px;
      min-height: 50px;
    }

    .day-cell.synced {
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
    }

    .day-cell.today {
      box-shadow: inset 0 0 0 2px #f59e0b;
    }

    .day-cell.future {
      opacity: 0.5;
    }

    .day-num {
      font-size: 0.85rem;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 4px;
    }

    .day-cell.synced .day-num {
      color: #16a34a;
    }

    .work-time {
      font-size: 0.7rem;
      color: #64748b;
      line-height: 1.4;
    }

    .loading {
      text-align: center;
      padding: 60px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #f1f5f9;
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      margin: 24px 0;
      color: #dc2626;
    }

    .refresh-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #f59e0b, #ea580c);
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(245, 158, 11, 0.4);
      transition: all 0.2s;
    }

    .refresh-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 24px rgba(245, 158, 11, 0.5);
    }

    /* Money Counter Easter Egg */
    .money-counter {
      position: fixed;
      left: 20px;
      bottom: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      z-index: 100;
    }

    .money-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(145deg, #ffd700, #ffb800);
      box-shadow: 0 4px 12px rgba(255, 193, 7, 0.4), inset 0 -3px 0 rgba(0,0,0,0.1);
      cursor: pointer;
      font-size: 1.8rem;
      transition: all 0.15s;
      user-select: none;
    }

    .money-btn:hover {
      transform: scale(1.1);
    }

    .money-btn:active {
      transform: scale(0.95);
      box-shadow: 0 2px 6px rgba(255, 193, 7, 0.4), inset 0 -1px 0 rgba(0,0,0,0.1);
    }

    .money-count {
      font-size: 0.85rem;
      font-weight: 700;
      color: #f59e0b;
      background: #fff;
      padding: 4px 12px;
      border-radius: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .money-popup {
      position: absolute;
      font-size: 1.2rem;
      font-weight: bold;
      color: #ffd700;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
      pointer-events: none;
      animation: floatUp 0.8s ease-out forwards;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-50px) scale(1.3); }
    }

    /* Post-it Memos */
    .memo-section {
      margin-top: 48px;
      margin-bottom: 32px;
    }

    .memo-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .memo-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #475569;
    }

    .add-memo-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 12px;
      background: #fff;
      color: #64748b;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: all 0.2s;
    }

    .add-memo-btn:hover {
      background: #f59e0b;
      color: #fff;
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
    }

    .memo-board {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      min-height: 100px;
    }

    .postit {
      width: 220px;
      min-height: 160px;
      padding: 20px;
      border-radius: 4px;
      position: relative;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      transform: rotate(-1deg);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .postit:nth-child(2n) { transform: rotate(1deg); }
    .postit:nth-child(3n) { transform: rotate(-2deg); }
    .postit:nth-child(5n) { transform: rotate(1.5deg); }

    .postit:hover {
      transform: rotate(0deg) scale(1.03);
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      z-index: 10;
    }

    .postit.yellow { background: linear-gradient(135deg, #fef3c7, #fde68a); }
    .postit.pink { background: linear-gradient(135deg, #fce7f3, #fbcfe8); }
    .postit.blue { background: linear-gradient(135deg, #dbeafe, #bfdbfe); }
    .postit.green { background: linear-gradient(135deg, #dcfce7, #bbf7d0); }
    .postit.purple { background: linear-gradient(135deg, #f3e8ff, #e9d5ff); }

    .postit::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 50px;
      height: 14px;
      background: rgba(0,0,0,0.08);
      border-radius: 0 0 6px 6px;
    }

    .postit-content {
      color: #1e293b;
      font-size: 0.95rem;
      line-height: 1.6;
      word-break: break-word;
      margin-top: 8px;
    }

    .postit-author {
      position: absolute;
      bottom: 10px;
      right: 12px;
      font-size: 0.7rem;
      color: rgba(0,0,0,0.4);
    }

    .postit-delete {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 20px;
      height: 20px;
      border: none;
      background: transparent;
      color: rgba(0,0,0,0.3);
      cursor: pointer;
      font-size: 1rem;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .postit:hover .postit-delete {
      opacity: 1;
    }

    .postit-delete:hover {
      color: #e53e3e;
    }

    .empty-memos {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
      font-size: 0.95rem;
      width: 100%;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: #fff;
      border-radius: 20px;
      padding: 28px;
      width: 90%;
      max-width: 420px;
      transform: translateY(20px);
      transition: transform 0.3s;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }

    .modal-overlay.active .modal {
      transform: translateY(0);
    }

    .modal h3 {
      margin-bottom: 24px;
      font-weight: 600;
      color: #1e293b;
      font-size: 1.2rem;
    }

    .modal-field {
      margin-bottom: 18px;
    }

    .modal-field label {
      display: block;
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .modal-field textarea,
    .modal-field input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      background: #f8fafc;
      color: #1e293b;
      font-size: 0.95rem;
      resize: none;
      transition: border-color 0.2s;
    }

    .modal-field textarea:focus,
    .modal-field input:focus {
      outline: none;
      border-color: #f59e0b;
    }

    .modal-field textarea {
      height: 100px;
    }

    .color-picker {
      display: flex;
      gap: 10px;
    }

    .color-option {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
    }

    .color-option:hover {
      transform: scale(1.1);
    }

    .color-option.selected {
      border-color: #f59e0b;
      box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.3);
    }

    .color-option.yellow { background: linear-gradient(135deg, #fef3c7, #fde68a); }
    .color-option.pink { background: linear-gradient(135deg, #fce7f3, #fbcfe8); }
    .color-option.blue { background: linear-gradient(135deg, #dbeafe, #bfdbfe); }
    .color-option.green { background: linear-gradient(135deg, #dcfce7, #bbf7d0); }
    .color-option.purple { background: linear-gradient(135deg, #f3e8ff, #e9d5ff); }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .modal-actions button {
      padding: 12px 24px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-cancel {
      background: #f1f5f9;
      border: none;
      color: #64748b;
    }

    .btn-cancel:hover {
      background: #e2e8f0;
    }

    .btn-submit {
      background: linear-gradient(135deg, #f59e0b, #ea580c);
      border: none;
      color: #fff;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
    }

    .btn-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(245, 158, 11, 0.4);
    }

    /* Announcement Banner */
    .announcement-banner {
      background: linear-gradient(135deg, #f59e0b, #ea580c);
      border-radius: 16px;
      padding: 18px 24px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      box-shadow: 0 4px 16px rgba(245, 158, 11, 0.3);
    }

    .announcement-content {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
    }

    .announcement-icon {
      font-size: 1.6rem;
    }

    .announcement-text {
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
    }

    .announcement-close {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      transition: background 0.2s;
    }

    .announcement-close:hover {
      background: rgba(255,255,255,0.3);
    }

    .announcement-edit {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      align-items: center;
    }

    .announcement-edit input {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 14px;
      background: #fff;
      color: #1e293b;
      font-size: 0.95rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: border-color 0.2s;
    }

    .announcement-edit input:focus {
      outline: none;
      border-color: #f59e0b;
    }

    .announcement-edit button {
      padding: 14px 24px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #f59e0b, #ea580c);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
    }

    .announcement-edit button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(245, 158, 11, 0.4);
    }

    .dm-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #64748b;
      font-size: 0.9rem;
      cursor: pointer;
      user-select: none;
      font-weight: 500;
    }

    .dm-checkbox input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #f59e0b;
      cursor: pointer;
    }

    /* Call Button */
    .call-btn {
      padding: 8px 14px;
      border: none;
      border-radius: 10px;
      background: #f1f5f9;
      color: #64748b;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      transition: all 0.2s;
      margin-left: auto;
    }

    .call-btn:hover {
      background: #ef4444;
      color: #fff;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }

    .call-btn.sending {
      opacity: 0.5;
      pointer-events: none;
    }

    /* Jira Section */
    .jira-section {
      margin-top: 48px;
      margin-bottom: 32px;
    }

    .jira-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }

    .jira-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .jira-title img {
      width: 28px;
      height: 28px;
    }

    .jira-filters {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .jira-filters select,
    .jira-filters input[type="date"] {
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      background: #fff;
      color: #1e293b;
      font-size: 0.9rem;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);

<body>

  <script>
    let currentWeekOffset = 0;
    let chart = null;
    let weekDaysData = [];
    let currentWeekKey = '';
    let selectedColor = 'yellow';
    const DAY_NAMES = ['월', '화', '수', '목', '금', '토', '일'];

    // Live Clock
    function updateClock() {
      const now = new Date();
      const options = { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' };
      const dateStr = now.toLocaleDateString('ko-KR', options);
      const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
      document.getElementById('currentDateTime').textContent = `${dateStr} ${timeStr}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Visitor Tracking
    async function trackVisit() {
      try {
        let visitorId = localStorage.getItem('knockdog_visitor_id');
        if (!visitorId) {
          visitorId = 'v_' + Math.random().toString(36).substr(2, 9);
          localStorage.setItem('knockdog_visitor_id', visitorId);
        }
        const res = await fetch('/api/visit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ visitorId })
        });
        const data = await res.json();
        if (data.todayCount !== undefined) {
          document.getElementById('visitorCount').textContent = data.todayCount;
        }
      } catch (e) {
        console.error('Visit tracking failed:', e);
      }
    }
    trackVisit();

    // Money Counter Easter Egg
    let moneyCount = parseInt(localStorage.getItem('knockdog_money') || '0');
    document.getElementById('moneyCount').textContent = '₩' + moneyCount.toLocaleString();

    function addMoney() {
      const amounts = [100, 500, 1000, 5000, 10000, 50000];
      const amount = amounts[Math.floor(Math.random() * amounts.length)];
      moneyCount += amount;
      localStorage.setItem('knockdog_money', moneyCount.toString());
      document.getElementById('moneyCount').textContent = '₩' + moneyCount.toLocaleString();
      
      // Create floating popup
      const counter = document.getElementById('moneyCounter');
      const popup = document.createElement('span');
      popup.className = 'money-popup';
      popup.textContent = '+₩' + amount.toLocaleString();
      popup.style.left = (Math.random() * 30) + 'px';
      counter.appendChild(popup);
      setTimeout(() => popup.remove(), 800);
    }

    async function loadData() {
      const content = document.getElementById('content');
      content.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <p style="color: #94a3b8;">로딩 중...</p>
        </div>
      `;

      try {
        const response = await fetch(`/api/sync-data?weekOffset=${currentWeekOffset}`);
        const data = await response.json();

        updateStatus(data.botConnected);
        document.getElementById('weekLabel').textContent = `${data.weekKey} 주차`;
        document.getElementById('nextWeek').disabled = currentWeekOffset <= 0;

        if (!data.success) {
          throw new Error(data.error || '데이터를 불러올 수 없습니다');
        }

        if (!data.botConnected) {
          const configMsg = data.missingConfig && data.missingConfig.length > 0 
            ? `누락된 환경변수: ${data.missingConfig.join(", ")}`
            : "BOT_TOKEN이 올바른지 확인해주세요.";
          content.innerHTML = `
            <div class="error-message">
              <h3>Discord 봇이 연결되지 않았습니다</h3>
              <p style="margin-top: 10px; color: #94a3b8;">${configMsg}</p>
            </div>
          `;
          return;
        }

        if (data.members.length === 0) {
          content.innerHTML = `
            <div class="error-message">
              <h3>데이터가 없습니다</h3>
              <p style="margin-top: 10px; color: #94a3b8;">Core 역할을 가진 멤버가 없거나 채널 ID가 올바르지 않습니다.</p>
            </div>
          `;
          return;
        }

        weekDaysData = data.weekDays || [];
        currentWeekKey = data.weekKey;
        renderDashboard(data);

      } catch (error) {
        content.innerHTML = `
          <div class="error-message">
            <h3>오류 발생</h3>
            <p style="margin-top: 10px; color: #94a3b8;">${error.message}</p>
          </div>
        `;
      }
    }

    function updateStatus(connected) {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      
      if (connected) {
        dot.classList.add('connected');
        text.textContent = 'Bot 연결됨';
      } else {
        dot.classList.remove('connected');
        text.textContent = 'Bot 미연결';
      }
    }

    function renderDashboard(data) {
      const coreMembers = data.members;
      const contributorMembers = data.contributorMembers || [];
      const metCount = coreMembers.filter(m => m.isMet).length;

      const content = document.getElementById('content');
      content.innerHTML = `
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value">${coreMembers.length}</div>
            <div class="stat-label">Core 멤버</div>
          </div>
          <div class="stat-card">
            <div class="stat-value green">${metCount}</div>
            <div class="stat-label">기준 충족</div>
          </div>

    function renderChart(members, requiredCount) {
      const ctx = document.getElementById('syncChart').getContext('2d');
      
      if (chart) {
        chart.destroy();
      }

      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: members.map(m => m.displayName),
          datasets: [{
            label: 'Sync 횟수',
            data: members.map(m => m.syncCount),
            backgroundColor: members.map(m => 
              m.isMet ? 'rgba(74, 222, 128, 0.6)' : 'rgba(248, 113, 113, 0.6)'
            ),
            borderColor: members.map(m => 
              m.isMet ? '#4ade80' : '#f87171'
            ),
            borderWidth: 1,
            borderRadius: 4,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#fff',
              titleColor: '#1e293b',
              bodyColor: '#64748b',
              borderColor: '#e2e8f0',
              borderWidth: 1,
              padding: 12,
              cornerRadius: 10,
              callbacks: {
                label: (context) => {
                  const member = members[context.dataIndex];
                  return `${member.syncCount} / ${requiredCount} (${member.percentage}%)`;
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              max: Math.max(requiredCount + 1, Math.max(...members.map(m => m.syncCount)) + 1),
              ticks: { color: '#64748b', stepSize: 1 },
              grid: { color: '#e2e8f0' }
            },
            x: {
              ticks: { color: '#64748b' },
              grid: { display: false }
            }
          }
        }
      });
    }

    function renderMemberCards(members, gridId) {
      const grid = document.getElementById(gridId);
      if (!grid) return;
      const today = new Date().toISOString().slice(0, 10);
      
      grid.innerHTML = members.map(member => `
        <div class="member-card ${member.isMet ? 'met' : 'not-met'}">
          <div class="member-header">
            <img src="${member.avatar}" alt="${member.displayName}" class="member-avatar" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23f1f5f9%22 width=%22100%22 height=%22100%22/><text fill=%22%2394a3b8%22 font-size=%2240%22 x=%2250%22 y=%2260%22 text-anchor=%22middle%22>${member.displayName.charAt(0)}</text></svg>'">
            <div class="member-info">
              <h3>${member.displayName}</h3>
              <span>@${member.username}</span>
            </div>
            <button class="call-btn" onclick="callMember('${member.id}', this)">📢 호출</button>
          </div>
          <div class="progress-container">
            <div class="progress-bar">
              <div class="progress-fill ${member.isMet ? 'complete' : 'incomplete'}" style="width: ${Math.min(member.percentage, 100)}%"></div>
            </div>
            <div class="progress-text">
              <span>${member.syncCount} / ${member.requiredCount}</span>
              <span>${member.percentage}%</span>
            </div>
          </div>
          <div class="week-schedule">
            <table class="schedule-table">
              <thead>
                <tr>
                  ${DAY_NAMES.map(name => `<th>${name}</th>`).join('')}
                </tr>
              </thead>
              <tbody>
                <tr>
                  ${weekDaysData.map(day => {
                    const isSynced = member.days.includes(day);
                    const isToday = day === today;
                    const isFuture = day > today;
                    const dayNum = parseInt(day.slice(8, 10));
                    const workTime = member.workingTimes && member.workingTimes[day] ? member.workingTimes[day] : '';
                    return `<td>
                      <div class="day-cell ${isSynced ? 'synced' : ''} ${isToday ? 'today' : ''} ${isFuture ? 'future' : ''}">
                        <div class="day-num">${dayNum}</div>
                        ${isSynced && workTime ? `<div class="work-time">${workTime}</div>` : ''}
                      </div>
                    </td>`;
                  }).join('')}
                </tr>
              </tbody>
            </table>

    document.getElementById('nextWeek').addEventListener('click', () => {
      if (currentWeekOffset > 0) {

    // Memo functions
    async function loadMemos() {
      try {
        const response = await fetch(`/api/memos?weekKey=${currentWeekKey}`);
        const data = await response.json();
        renderMemos(data.memos || []);
      } catch (err) {

    function renderMemos(memos) {
      const board = document.getElementById('memoBoard');

        board.innerHTML = '<div class="empty-memos">메모가 없습니다</div>';

      }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function openMemoModal() {
      document.getElementById('memoModal').classList.add('active');
      document.getElementById('memoContent').value = '';
      document.getElementById('memoAuthor').value = '';
      selectedColor = 'yellow';
      updateColorSelection();
    }

    function closeMemoModal() {
      document.getElementById('memoModal').classList.remove('active');
    }

    function updateColorSelection() {
      document.querySelectorAll('.color-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.color === selectedColor);
      });
    }

    document.querySelectorAll('.color-option').forEach(el => {
      el.addEventListener('click', () => {
        selectedColor = el.dataset.color;
        updateColorSelection();
      });

    async function submitMemo() {
      const content = document.getElementById('memoContent').value.trim();
      const author = document.getElementById('memoAuthor').value.trim() || 'Anonymous';
      
      if (!content) {
        alert('메모 내용을 입력하세요.');
        return;
      }

      try {
        const response = await fetch('/api/memos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            weekKey: currentWeekKey,
            content,
            color: selectedColor,
            author
          })
        });

        if (response.ok) {
          closeMemoModal();
          loadMemos();
        } else {
          alert('메모 저장에 실패했습니다.');
        }
      } catch (err) {
        console.error('Failed to save memo:', err);
        alert('메모 저장에 실패했습니다.');
      }
    }

    async function deleteMemo(id) {
      if (!confirm('이 메모를 삭제하시겠습니까?')) return;
      
      try {
        const response = await fetch(`/api/memos/${id}`, { method: 'DELETE' });
        if (response.ok) {
          loadMemos();
        }
      } catch (err) {
        console.error('Failed to delete memo:', err);
      }

      try {

        const data = await response.json();
        renderAnnouncement(data.announcement);
      } catch (err) {
        console.error('Failed to load announcement:', err);
      }
    }

    function renderAnnouncement(announcement) {
      const container = document.getElementById('announcementContainer');
      if (!announcement) {
        container.innerHTML = '';
        return;
      }

      container.innerHTML = `
        <div class="announcement-banner">
          <div class="announcement-content">
            <span class="announcement-icon">📢</span>
            <span class="announcement-text">${escapeHtml(announcement.content)}</span>
          </div>
          <button class="announcement-close" onclick="deleteAnnouncement(${announcement.id})">×</button>
        </div>
      `;
    }

    async function submitAnnouncement() {
      const input = document.getElementById('announcementInput');
      const sendDmCheck = document.getElementById('sendDmCheck');
      const content = input.value.trim();
      const sendDM = sendDmCheck.checked;
      
      if (!content) {
        alert('공지사항 내용을 입력하세요.');
        return;
      }

      if (sendDM && !confirm('모든 멤버에게 DM을 전송합니다. 계속하시겠습니까?')) {
        return;
      }

      try {
        const response = await fetch('/api/announcements', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content, sendDM })
        });

        if (response.ok) {
          const result = await response.json();
          input.value = '';
          sendDmCheck.checked = false;
          loadAnnouncement();
          if (sendDM && result.dmResults) {
            alert(`공지사항이 등록되었습니다.\nDM 발송: ${result.dmResults.sent}명 성공, ${result.dmResults.failed}명 실패`);
          }
        } else {
          alert('공지사항 등록에 실패했습니다.');
        }
      } catch (err) {
        console.error('Failed to save announcement:', err);
        alert('공지사항 등록에 실패했습니다.');
      }
    }

    async function deleteAnnouncement(id) {
      try {
        await fetch(`/api/announcements/${id}`, { method: 'DELETE' });
        loadAnnouncement();
      } catch (err) {
        console.error('Failed to delete announcement:', err);
      }
    }

    // Call member function
    async function callMember(userId, btn) {
      if (!confirm('이 멤버를 호출하시겠습니까?')) return;
      
      btn.classList.add('sending');
      btn.textContent = '전송중...';
      
      try {
        const response = await fetch(`/api/call-member/${userId}`, { method: 'POST' });
        const data = await response.json();
        
        if (response.ok) {
          btn.textContent = '✓ 전송완료';
          setTimeout(() => {
            btn.textContent = '📢 호출';
            btn.classList.remove('sending');
          }, 2000);
        } else {
          alert(data.error || '호출에 실패했습니다.');
          btn.textContent = '📢 호출';
          btn.classList.remove('sending');
        }
      } catch (err) {
        console.error('Failed to call member:', err);
        alert('호출에 실패했습니다.');
        btn.textContent = '📢 호출';
        btn.classList.remove('sending');
      }
    }

    loadAnnouncement();

    // Jira functions
    async function loadJiraStats() {
      const content = document.getElementById('jiraContent');
      if (!content) return;
      
      content.innerHTML = '<div class="jira-loading">Jira 데이터 로딩 중...</div>';
      
      try {
        const startDate = document.getElementById('jiraStartDate')?.value || '';
        const endDate = document.getElementById('jiraEndDate')?.value || '';

        if (startDate) url += `startDate=${encodeURIComponent(startDate)}&`;
        if (endDate) url += `endDate=${encodeURIComponent(endDate)}&`;
        
        const response = await fetch(url);
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || 'Failed to load Jira data');
        }

              <div class="jira-assignee-info">
                <h3>${escapeHtml(assignee.displayName)}</h3>
                <span>${assignee.email || ''}</span>
              </div>
              <div class="jira-count">${assignee.completedCount}</div>
            </div>

                <div class="jira-issue-item">
                  <span class="jira-issue-key">${issue.key}</span>
                  <span class="jira-issue-summary">${escapeHtml(issue.summary.length > 40 ? issue.summary.substring(0, 40) + '...' : issue.summary)}</span>
                </div>

    // ===== Daily Standup Functions =====
    let dailyItems = { done: [], inProgress: [] };
    let membersList = [];
    let selectedUser = null;
    let currentJiraTarget = null;
    let selectedJiraTickets = [];

    async function initDailyStandup() {
      // Set today's date
      const today = new Date().toISOString().slice(0, 10);
      document.getElementById('dailyDate').value = today;
      
      // Set default working time (10:00 - 19:00)
      document.getElementById('startHour').value = '10';
      document.getElementById('startMin').value = '00';
      document.getElementById('endHour').value = '19';
      document.getElementById('endMin').value = '00';
      
      // Load members list
      try {
        const response = await fetch('/api/members-list');
        const data = await response.json();
        if (data.success) {
          membersList = data.members;
          const select = document.getElementById('dailyUserSelect');
          select.innerHTML = '<option value="">선택하세요...</option>' + 
            membersList.map(m => `<option value="${m.id}" data-name="${m.displayName}">${m.displayName} (@${m.username})</option>`).join('');
          
          // Restore saved user from localStorage
          const savedUserId = localStorage.getItem('knockdog_daily_user');
          if (savedUserId) {
            select.value = savedUserId;
            onUserSelect();
          }

      } catch (err) {
        console.error('Failed to load members:', err);

    function toggleDaily() {
      const content = document.getElementById('dailyContent');
      const toggle = document.getElementById('dailyToggle');
      content.classList.toggle('show');
      toggle.classList.toggle('open');
    }

    function onUserSelect() {
      const select = document.getElementById('dailyUserSelect');
      const userId = select.value;
      const selectedOption = select.options[select.selectedIndex];
      
      if (userId) {
        selectedUser = {
          id: userId,
          displayName: selectedOption.dataset.name
        };
        localStorage.setItem('knockdog_daily_user', userId);
        
        // Enable buttons
        document.getElementById('jiraDoneBtn').disabled = false;
        document.getElementById('jiraProgressBtn').disabled = false;
        document.getElementById('submitDailyBtn').disabled = false;
      } else {
        selectedUser = null;
        document.getElementById('jiraDoneBtn').disabled = true;
        document.getElementById('jiraProgressBtn').disabled = true;
        document.getElementById('submitDailyBtn').disabled = true;
      }
    }

    function handleEnterKey(event, type) {
      if (event.key === 'Enter') {
        addDailyItem(type);
      }
    }

    function addDailyItem(type, text = null) {
      const inputId = type === 'done' ? 'doneInput' : 'inProgressInput';
      const input = document.getElementById(inputId);
      const value = text || input.value.trim();
      
      if (!value) return;
      
      dailyItems[type].push(value);
      if (!text) input.value = '';
      renderDailyItems(type);
    }

    function removeDailyItem(type, index) {
      dailyItems[type].splice(index, 1);
      renderDailyItems(type);
    }

    function renderDailyItems(type) {
      const listId = type === 'done' ? 'doneList' : 'inProgressList';
      const list = document.getElementById(listId);
      
      list.innerHTML = dailyItems[type].map((item, index) => `
        <div class="daily-item">
          <input type="text" value="${escapeHtml(item)}" onchange="updateDailyItem('${type}', ${index}, this.value)">
          <button class="remove-btn" onclick="removeDailyItem('${type}', ${index})">×</button>
        </div>
      `).join('');
    }

    function updateDailyItem(type, index, value) {
      dailyItems[type][index] = value;
    }

    async function importJiraTickets(target) {
      if (!selectedUser) {
        alert('먼저 작성자를 선택해주세요.');
        return;
      }
      
      currentJiraTarget = target;
      selectedJiraTickets = [];
      
      const modal = document.getElementById('jiraTicketsModal');
      const list = document.getElementById('jiraTicketsList');
      
      list.innerHTML = '<div class="loading"><div class="spinner"></div><p style="color: #94a3b8;">Jira 티켓 로딩 중...</p></div>';
      modal.classList.add('active');
      
      try {
        const response = await fetch(`/api/jira/my-issues?displayName=${encodeURIComponent(selectedUser.displayName)}`);
        const data = await response.json();
        
        if (!data.success || !data.issues || data.issues.length === 0) {
          list.innerHTML = '<p style="text-align:center; color:#94a3b8; padding:20px;">할당된 티켓이 없습니다</p>';
          return;
        }
        
        const doneIssues = data.issues.filter(i => i.category === 'done');
        const inProgressIssues = data.issues.filter(i => i.category === 'inProgress');
        
        let html = '';
        
        if (doneIssues.length > 0) {
          html += '<div style="margin-bottom:12px;"><strong style="color:#16a34a;">✅ 완료 (Done)</strong></div>';
          html += doneIssues.map(issue => `
            <div class="jira-ticket-item" onclick="toggleJiraTicket('${issue.key}', '${escapeHtml(issue.summary).replace(/'/g, "\\'")}', 'done', this)">
              <input type="checkbox" id="ticket-${issue.key}">
              <span class="jira-ticket-key">${issue.key}</span>
              <span class="jira-ticket-summary">${escapeHtml(issue.summary)}</span>
            </div>
          `).join('');
        }
        
        if (inProgressIssues.length > 0) {
          html += '<div style="margin:16px 0 12px 0;"><strong style="color:#f59e0b;">⚒️ 진행 중 (In Progress)</strong></div>';
          html += inProgressIssues.map(issue => `
            <div class="jira-ticket-item" onclick="toggleJiraTicket('${issue.key}', '${escapeHtml(issue.summary).replace(/'/g, "\\'")}', 'inProgress', this)">
              <input type="checkbox" id="ticket-${issue.key}">
              <span class="jira-ticket-key">${issue.key}</span>
              <span class="jira-ticket-summary">${escapeHtml(issue.summary)}</span>
            </div>
          `).join('');
        }
        
        list.innerHTML = html;
      } catch (err) {
        list.innerHTML = `<p style="text-align:center; color:#dc2626; padding:20px;">오류: ${escapeHtml(err.message)}</p>`;
      }
    }

    function toggleJiraTicket(key, summary, category, element) {
      const checkbox = element.querySelector('input[type="checkbox"]');
      checkbox.checked = !checkbox.checked;
      element.classList.toggle('selected', checkbox.checked);
      
      if (checkbox.checked) {
        selectedJiraTickets.push({ key, summary, category });
      } else {
        selectedJiraTickets = selectedJiraTickets.filter(t => t.key !== key);
      }
    }

    function closeJiraModal() {
      document.getElementById('jiraTicketsModal').classList.remove('active');
      selectedJiraTickets = [];
    }

    function confirmJiraImport() {
      if (selectedJiraTickets.length === 0) {
        alert('티켓을 선택해주세요.');
        return;
      }
      
      selectedJiraTickets.forEach(ticket => {
        const targetSection = ticket.category === 'done' ? 'done' : 'inProgress';
        addDailyItem(targetSection, `${ticket.key} ${ticket.summary}`);
      });
      
      closeJiraModal();
    }

    function getWorkingTime() {
      const startH = document.getElementById('startHour').value;
      const startM = document.getElementById('startMin').value;
      const endH = document.getElementById('endHour').value;
      const endM = document.getElementById('endMin').value;
      return `${startH}:${startM}-${endH}:${endM}`;
    }

    function previewDaily() {
      const date = document.getElementById('dailyDate').value;
      const blocker = document.getElementById('blockerInput').value.trim();
      const workingTime = getWorkingTime();
      
      let preview = `[${date} / ${selectedUser?.displayName || '이름'}]\n\n`;
      
      if (dailyItems.done.length > 0) {
        preview += '✅ Done\n' + dailyItems.done.join('\n') + '\n\n';
      }
      
      if (dailyItems.inProgress.length > 0) {
        preview += '⚒️ In progress\n' + dailyItems.inProgress.join('\n') + '\n\n';
      }
      
      preview += '⚠️ Blocker\n' + (blocker || '없음') + '\n\n';
      preview += '👩🏻‍💻 Working-time\n' + workingTime;
      
      alert(preview);
    }

    async function submitDaily() {
      if (!selectedUser) {
        alert('작성자를 선택해주세요.');
        return;
      }
      
      const date = document.getElementById('dailyDate').value;
      const blocker = document.getElementById('blockerInput').value.trim();
      const workingTime = getWorkingTime();
      
      const btn = document.getElementById('submitDailyBtn');
      btn.disabled = true;
      btn.textContent = '게시 중...';
      
      try {
        const response = await fetch('/api/post-daily', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: selectedUser.id,
            displayName: selectedUser.displayName,
            date: date,
            done: dailyItems.done,
            inProgress: dailyItems.inProgress,
            blocker: blocker || null,
            workingTime: workingTime
          })
        });
        
        const data = await response.json();
        
        if (data.success) {
          alert(`✅ Discord에 게시되었습니다!\n\n${data.threadName}`);
          // Clear form
          dailyItems = { done: [], inProgress: [] };
          renderDailyItems('done');
          renderDailyItems('inProgress');
          document.getElementById('blockerInput').value = '';
          // Reload data to show new thread
          loadData();
        } else {
          throw new Error(data.error || '게시 실패');
        }
      } catch (err) {
        alert('오류: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Discord에 게시';
      }
    }

    // Initialize daily standup on page load
    document.addEventListener('DOMContentLoaded', initDailyStandup);
  </script>
</body>
</html>
