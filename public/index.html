<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knockdog Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      min-height: 100vh;
      color: #e8e8e8;
      padding: 24px;
      overflow-x: hidden;
    }

    /* Snowfall */
    .snowflakes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
    }

    .snowflake {
      position: absolute;
      top: -20px;
      color: rgba(255,255,255,0.6);
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.4; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }

    .snowflake:nth-child(1) { left: 5%; animation-duration: 10s; animation-delay: 0s; font-size: 0.7rem; }
    .snowflake:nth-child(2) { left: 15%; animation-duration: 12s; animation-delay: 1s; font-size: 0.9rem; }
    .snowflake:nth-child(3) { left: 25%; animation-duration: 11s; animation-delay: 2s; font-size: 0.6rem; }
    .snowflake:nth-child(4) { left: 35%; animation-duration: 13s; animation-delay: 0.5s; font-size: 0.8rem; }
    .snowflake:nth-child(5) { left: 45%; animation-duration: 10s; animation-delay: 3s; font-size: 0.7rem; }
    .snowflake:nth-child(6) { left: 55%; animation-duration: 14s; animation-delay: 1.5s; font-size: 0.5rem; }
    .snowflake:nth-child(7) { left: 65%; animation-duration: 11s; animation-delay: 2.5s; font-size: 1rem; }
    .snowflake:nth-child(8) { left: 75%; animation-duration: 12s; animation-delay: 0.2s; font-size: 0.6rem; }
    .snowflake:nth-child(9) { left: 85%; animation-duration: 13s; animation-delay: 1.8s; font-size: 0.8rem; }
    .snowflake:nth-child(10) { left: 95%; animation-duration: 10s; animation-delay: 3.5s; font-size: 0.7rem; }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.8rem;
      background: rgba(255,255,255,0.08);
      color: #999;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
    }

    .status-dot.connected {
      background: #4ade80;
    }

    .week-nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .week-nav button {
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      background: transparent;
      color: #999;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .week-nav button:hover {
      background: rgba(255,255,255,0.05);
      color: #fff;
    }

    .week-nav button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .week-label {
      font-size: 1rem;
      font-weight: 500;
      color: #ccc;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }

    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 600;
      color: #fff;
    }

    .stat-value.green { color: #4ade80; }
    .stat-value.red { color: #f87171; }

    .stat-label {
      font-size: 0.75rem;
      color: #666;
      margin-top: 4px;
    }

    .chart-container {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
    }

    .chart-title {
      font-size: 0.95rem;
      font-weight: 500;
      margin-bottom: 16px;
      color: #999;
    }

    .chart-wrapper {
      position: relative;
      height: 250px;
    }

    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 16px;
    }

    @media (max-width: 768px) {
      .members-grid {
        grid-template-columns: 1fr;
      }
    }

    .member-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.2s;
    }

    .member-card:hover {
      border-color: rgba(255,255,255,0.15);
    }

    .member-card.met {
      border-left: 3px solid #4ade80;
    }

    .member-card.not-met {
      border-left: 3px solid #f87171;
    }

    .member-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .member-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #333;
    }

    .member-info h3 {
      font-size: 0.95rem;
      font-weight: 500;
      color: #fff;
    }

    .member-info span {
      font-size: 0.75rem;
      color: #666;
    }

    .progress-container {
      margin-bottom: 16px;
    }

    .progress-bar {
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .progress-fill.complete {
      background: #4ade80;
    }

    .progress-fill.incomplete {
      background: #f87171;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 0.75rem;
      color: #666;
    }

    .week-schedule {
      margin-top: 12px;
    }

    .schedule-table {
      width: 100%;
      border-collapse: collapse;
    }

    .schedule-table th {
      font-size: 0.7rem;
      font-weight: 500;
      color: #666;
      padding: 6px 4px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .schedule-table td {
      padding: 8px 4px;
      text-align: center;
      vertical-align: top;
    }

    .day-cell {
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      padding: 8px 4px;
      min-height: 50px;
    }

    .day-cell.synced {
      background: rgba(74, 222, 128, 0.15);
    }

    .day-cell.today {
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.3);
    }

    .day-cell.future {
      opacity: 0.4;
    }

    .day-num {
      font-size: 0.8rem;
      font-weight: 500;
      color: #888;
      margin-bottom: 4px;
    }

    .day-cell.synced .day-num {
      color: #4ade80;
    }

    .work-time {
      font-size: 0.65rem;
      color: #aaa;
      line-height: 1.3;
    }

    .loading {
      text-align: center;
      padding: 60px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: #666;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 10px;
      padding: 24px;
      text-align: center;
      margin: 24px 0;
    }

    .refresh-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: #1a1a1a;
      color: #999;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .refresh-btn:hover {
      background: #252525;
      color: #fff;
    }

    /* Post-it Memos */
    .memo-section {
      margin-top: 40px;
      margin-bottom: 32px;
    }

    .memo-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .memo-title {
      font-size: 1rem;
      font-weight: 500;
      color: #999;
    }

    .add-memo-btn {
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      background: transparent;
      color: #999;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .add-memo-btn:hover {
      background: rgba(255,255,255,0.05);
      color: #fff;
    }

    .memo-board {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      min-height: 100px;
    }

    .postit {
      width: 200px;
      min-height: 150px;
      padding: 16px;
      border-radius: 2px;
      position: relative;
      box-shadow: 2px 3px 12px rgba(0,0,0,0.3);
      transform: rotate(-1deg);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .postit:nth-child(2n) { transform: rotate(1deg); }
    .postit:nth-child(3n) { transform: rotate(-2deg); }
    .postit:nth-child(5n) { transform: rotate(1.5deg); }

    .postit:hover {
      transform: rotate(0deg) scale(1.02);
      box-shadow: 4px 6px 20px rgba(0,0,0,0.4);
      z-index: 10;
    }

    .postit.yellow { background: #fef3c7; }
    .postit.pink { background: #fce7f3; }
    .postit.blue { background: #dbeafe; }
    .postit.green { background: #dcfce7; }
    .postit.purple { background: #f3e8ff; }

    .postit::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 12px;
      background: rgba(0,0,0,0.1);
      border-radius: 0 0 4px 4px;
    }

    .postit-content {
      color: #333;
      font-size: 0.9rem;
      line-height: 1.5;
      word-break: break-word;
      margin-top: 8px;
    }

    .postit-author {
      position: absolute;
      bottom: 10px;
      right: 12px;
      font-size: 0.7rem;
      color: rgba(0,0,0,0.4);
    }

    .postit-delete {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 20px;
      height: 20px;
      border: none;
      background: transparent;
      color: rgba(0,0,0,0.3);
      cursor: pointer;
      font-size: 1rem;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .postit:hover .postit-delete {
      opacity: 1;
    }

    .postit-delete:hover {
      color: #e53e3e;
    }

    .empty-memos {
      text-align: center;
      padding: 40px;
      color: #555;
      font-size: 0.9rem;
      width: 100%;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: #252525;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
      transform: translateY(20px);
      transition: transform 0.3s;
    }

    .modal-overlay.active .modal {
      transform: translateY(0);
    }

    .modal h3 {
      margin-bottom: 20px;
      font-weight: 500;
    }

    .modal-field {
      margin-bottom: 16px;
    }

    .modal-field label {
      display: block;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 6px;
    }

    .modal-field textarea,
    .modal-field input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      background: #1a1a1a;
      color: #fff;
      font-size: 0.9rem;
      resize: none;
    }

    .modal-field textarea {
      height: 100px;
    }

    .color-picker {
      display: flex;
      gap: 8px;
    }

    .color-option {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
    }

    .color-option:hover {
      transform: scale(1.1);
    }

    .color-option.selected {
      border-color: #fff;
    }

    .color-option.yellow { background: #fef3c7; }
    .color-option.pink { background: #fce7f3; }
    .color-option.blue { background: #dbeafe; }
    .color-option.green { background: #dcfce7; }
    .color-option.purple { background: #f3e8ff; }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .modal-actions button {
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: #999;
    }

    .btn-cancel:hover {
      background: rgba(255,255,255,0.05);
    }

    .btn-submit {
      background: #4ade80;
      border: none;
      color: #000;
      font-weight: 500;
    }

    .btn-submit:hover {
      background: #22c55e;
    }

    /* Announcement Banner */
    .announcement-banner {
      background: linear-gradient(90deg, #f59e0b, #d97706);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .announcement-content {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .announcement-icon {
      font-size: 1.5rem;
    }

    .announcement-text {
      color: #000;
      font-weight: 500;
      font-size: 0.95rem;
    }

    .announcement-close {
      background: rgba(0,0,0,0.2);
      border: none;
      color: #000;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }

    .announcement-close:hover {
      background: rgba(0,0,0,0.3);
    }

    .announcement-edit {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .announcement-edit input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 0.9rem;
    }

    .announcement-edit button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: #f59e0b;
      color: #000;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .announcement-edit button:hover {
      background: #d97706;
    }

    /* Call Button */
    .call-btn {
      padding: 6px 12px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      background: transparent;
      color: #999;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.2s;
      margin-left: auto;
    }

    .call-btn:hover {
      background: #f87171;
      border-color: #f87171;
      color: #fff;
    }

    .call-btn.sending {
      opacity: 0.5;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="snowflakes">
    <div class="snowflake">*</div>
    <div class="snowflake">*</div>
    <div class="snowflake">*</div>
    <div class="snowflake">*</div>
    <div class="snowflake">*</div>
    <div class="snowflake">*</div>
    <div class="snowflake">*</div>
    <div class="snowflake">*</div>
    <div class="snowflake">*</div>
    <div class="snowflake">*</div>
  </div>

  <div class="container">
    <header>
      <h1>Knockdog Admin</h1>
      <div class="status-badge">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">연결 확인 중...</span>
      </div>
    </header>

    <div id="announcementContainer"></div>

    <div class="announcement-edit">
      <input type="text" id="announcementInput" placeholder="새 공지사항 입력...">
      <button onclick="submitAnnouncement()">공지 등록</button>
    </div>

    <div class="week-nav">
      <button id="prevWeek">이전 주</button>
      <span class="week-label" id="weekLabel">-</span>
      <button id="nextWeek">다음 주</button>
    </div>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p style="color: #666;">로딩 중...</p>
      </div>
    </div>
  </div>

  <button class="refresh-btn" onclick="loadData()" title="새로고침">↻</button>

  <!-- Add Memo Modal -->
  <div class="modal-overlay" id="memoModal">
    <div class="modal">
      <h3>메모 추가</h3>
      <div class="modal-field">
        <label>내용</label>
        <textarea id="memoContent" placeholder="메모 내용을 입력하세요..."></textarea>
      </div>
      <div class="modal-field">
        <label>작성자</label>
        <input type="text" id="memoAuthor" placeholder="이름 (선택사항)">
      </div>
      <div class="modal-field">
        <label>색상</label>
        <div class="color-picker">
          <div class="color-option yellow selected" data-color="yellow"></div>
          <div class="color-option pink" data-color="pink"></div>
          <div class="color-option blue" data-color="blue"></div>
          <div class="color-option green" data-color="green"></div>
          <div class="color-option purple" data-color="purple"></div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeMemoModal()">취소</button>
        <button class="btn-submit" onclick="submitMemo()">추가</button>
      </div>
    </div>
  </div>

  <script>
    let currentWeekOffset = 0;
    let chart = null;
    let weekDaysData = [];
    let currentWeekKey = '';
    let selectedColor = 'yellow';
    const DAY_NAMES = ['월', '화', '수', '목', '금', '토', '일'];

    async function loadData() {
      const content = document.getElementById('content');
      content.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <p style="color: #666;">로딩 중...</p>
        </div>
      `;

      try {
        const response = await fetch(`/api/sync-data?weekOffset=${currentWeekOffset}`);
        const data = await response.json();

        updateStatus(data.botConnected);
        document.getElementById('weekLabel').textContent = `${data.weekKey} 주차`;
        document.getElementById('nextWeek').disabled = currentWeekOffset <= 0;

        if (!data.success) {
          throw new Error(data.error || '데이터를 불러올 수 없습니다');
        }

        if (!data.botConnected) {
          const configMsg = data.missingConfig && data.missingConfig.length > 0 
            ? `누락된 환경변수: ${data.missingConfig.join(", ")}`
            : "BOT_TOKEN이 올바른지 확인해주세요.";
          content.innerHTML = `
            <div class="error-message">
              <h3>Discord 봇이 연결되지 않았습니다</h3>
              <p style="margin-top: 10px; color: #888;">${configMsg}</p>
            </div>
          `;
          return;
        }

        if (data.members.length === 0) {
          content.innerHTML = `
            <div class="error-message">
              <h3>데이터가 없습니다</h3>
              <p style="margin-top: 10px; color: #888;">Core 역할을 가진 멤버가 없거나 채널 ID가 올바르지 않습니다.</p>
            </div>
          `;
          return;
        }

        weekDaysData = data.weekDays || [];
        currentWeekKey = data.weekKey;
        renderDashboard(data);

      } catch (error) {
        content.innerHTML = `
          <div class="error-message">
            <h3>오류 발생</h3>
            <p style="margin-top: 10px; color: #888;">${error.message}</p>
          </div>
        `;
      }
    }

    function updateStatus(connected) {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      
      if (connected) {
        dot.classList.add('connected');
        text.textContent = 'Bot 연결됨';
      } else {
        dot.classList.remove('connected');
        text.textContent = 'Bot 미연결';
      }
    }

    function renderDashboard(data) {
      const members = data.members;
      const metCount = members.filter(m => m.isMet).length;
      const avgPercentage = Math.round(members.reduce((sum, m) => sum + m.percentage, 0) / members.length);

      const content = document.getElementById('content');
      content.innerHTML = `
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value">${members.length}</div>
            <div class="stat-label">총 멤버</div>
          </div>
          <div class="stat-card">
            <div class="stat-value green">${metCount}</div>
            <div class="stat-label">기준 충족</div>
          </div>
          <div class="stat-card">
            <div class="stat-value red">${members.length - metCount}</div>
            <div class="stat-label">기준 미달</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${avgPercentage}%</div>
            <div class="stat-label">평균 달성률</div>
          </div>
        </div>

        <div class="chart-container">
          <h2 class="chart-title">멤버별 Core Sync 현황</h2>
          <div class="chart-wrapper">
            <canvas id="syncChart"></canvas>
          </div>
        </div>

        <div class="members-grid" id="membersGrid"></div>

        <div class="memo-section">
          <div class="memo-header">
            <h2 class="memo-title">이번 주 메모</h2>
            <button class="add-memo-btn" onclick="openMemoModal()">+ 메모 추가</button>
          </div>
          <div class="memo-board" id="memoBoard">
            <div class="empty-memos">메모가 없습니다</div>
          </div>
        </div>
      `;

      renderChart(members, data.requiredCount);
      renderMemberCards(members);
      loadMemos();
    }

    function renderChart(members, requiredCount) {
      const ctx = document.getElementById('syncChart').getContext('2d');
      
      if (chart) {
        chart.destroy();
      }

      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: members.map(m => m.displayName),
          datasets: [{
            label: 'Sync 횟수',
            data: members.map(m => m.syncCount),
            backgroundColor: members.map(m => 
              m.isMet ? 'rgba(74, 222, 128, 0.6)' : 'rgba(248, 113, 113, 0.6)'
            ),
            borderColor: members.map(m => 
              m.isMet ? '#4ade80' : '#f87171'
            ),
            borderWidth: 1,
            borderRadius: 4,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#222',
              titleColor: '#fff',
              bodyColor: '#ccc',
              padding: 10,
              cornerRadius: 6,
              callbacks: {
                label: (context) => {
                  const member = members[context.dataIndex];
                  return `${member.syncCount} / ${requiredCount} (${member.percentage}%)`;
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              max: Math.max(requiredCount + 1, Math.max(...members.map(m => m.syncCount)) + 1),
              ticks: { color: '#666', stepSize: 1 },
              grid: { color: 'rgba(255,255,255,0.05)' }
            },
            x: {
              ticks: { color: '#666' },
              grid: { display: false }
            }
          }
        }
      });
    }

    function renderMemberCards(members) {
      const grid = document.getElementById('membersGrid');
      const today = new Date().toISOString().slice(0, 10);
      
      grid.innerHTML = members.map(member => `
        <div class="member-card ${member.isMet ? 'met' : 'not-met'}">
          <div class="member-header">
            <img src="${member.avatar}" alt="${member.displayName}" class="member-avatar" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23333%22 width=%22100%22 height=%22100%22/><text fill=%22%23666%22 font-size=%2240%22 x=%2250%22 y=%2260%22 text-anchor=%22middle%22>${member.displayName.charAt(0)}</text></svg>'">
            <div class="member-info">
              <h3>${member.displayName}</h3>
              <span>@${member.username}</span>
            </div>
            <button class="call-btn" onclick="callMember('${member.id}', this)">📢 호출</button>
          </div>
          <div class="progress-container">
            <div class="progress-bar">
              <div class="progress-fill ${member.isMet ? 'complete' : 'incomplete'}" style="width: ${Math.min(member.percentage, 100)}%"></div>
            </div>
            <div class="progress-text">
              <span>${member.syncCount} / ${member.requiredCount}</span>
              <span>${member.percentage}%</span>
            </div>
          </div>
          <div class="week-schedule">
            <table class="schedule-table">
              <thead>
                <tr>
                  ${DAY_NAMES.map(name => `<th>${name}</th>`).join('')}
                </tr>
              </thead>
              <tbody>
                <tr>
                  ${weekDaysData.map(day => {
                    const isSynced = member.days.includes(day);
                    const isToday = day === today;
                    const isFuture = day > today;
                    const dayNum = parseInt(day.slice(8, 10));
                    const workTime = member.workingTimes && member.workingTimes[day] ? member.workingTimes[day] : '';
                    return `<td>
                      <div class="day-cell ${isSynced ? 'synced' : ''} ${isToday ? 'today' : ''} ${isFuture ? 'future' : ''}">
                        <div class="day-num">${dayNum}</div>
                        ${isSynced && workTime ? `<div class="work-time">${workTime}</div>` : ''}
                      </div>
                    </td>`;
                  }).join('')}
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('prevWeek').addEventListener('click', () => {
      currentWeekOffset++;
      loadData();
    });

    document.getElementById('nextWeek').addEventListener('click', () => {
      if (currentWeekOffset > 0) {
        currentWeekOffset--;
        loadData();
      }
    });

    loadData();
    setInterval(loadData, 600000);

    // Memo functions
    async function loadMemos() {
      try {
        const response = await fetch(`/api/memos?weekKey=${currentWeekKey}`);
        const data = await response.json();
        renderMemos(data.memos || []);
      } catch (err) {
        console.error('Failed to load memos:', err);
      }
    }

    function renderMemos(memos) {
      const board = document.getElementById('memoBoard');
      if (!board) return;
      
      if (memos.length === 0) {
        board.innerHTML = '<div class="empty-memos">메모가 없습니다</div>';
        return;
      }

      board.innerHTML = memos.map(memo => `
        <div class="postit ${memo.color}">
          <button class="postit-delete" onclick="deleteMemo(${memo.id})">×</button>
          <div class="postit-content">${escapeHtml(memo.content)}</div>
          <div class="postit-author">${escapeHtml(memo.author)}</div>
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function openMemoModal() {
      document.getElementById('memoModal').classList.add('active');
      document.getElementById('memoContent').value = '';
      document.getElementById('memoAuthor').value = '';
      selectedColor = 'yellow';
      updateColorSelection();
    }

    function closeMemoModal() {
      document.getElementById('memoModal').classList.remove('active');
    }

    function updateColorSelection() {
      document.querySelectorAll('.color-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.color === selectedColor);
      });
    }

    document.querySelectorAll('.color-option').forEach(el => {
      el.addEventListener('click', () => {
        selectedColor = el.dataset.color;
        updateColorSelection();
      });
    });

    async function submitMemo() {
      const content = document.getElementById('memoContent').value.trim();
      const author = document.getElementById('memoAuthor').value.trim() || 'Anonymous';
      
      if (!content) {
        alert('메모 내용을 입력하세요.');
        return;
      }

      try {
        const response = await fetch('/api/memos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            weekKey: currentWeekKey,
            content,
            color: selectedColor,
            author
          })
        });

        if (response.ok) {
          closeMemoModal();
          loadMemos();
        } else {
          alert('메모 저장에 실패했습니다.');
        }
      } catch (err) {
        console.error('Failed to save memo:', err);
        alert('메모 저장에 실패했습니다.');
      }
    }

    async function deleteMemo(id) {
      if (!confirm('이 메모를 삭제하시겠습니까?')) return;
      
      try {
        const response = await fetch(`/api/memos/${id}`, { method: 'DELETE' });
        if (response.ok) {
          loadMemos();
        }
      } catch (err) {
        console.error('Failed to delete memo:', err);
      }
    }

    // Close modal on overlay click
    document.getElementById('memoModal').addEventListener('click', (e) => {
      if (e.target.classList.contains('modal-overlay')) {
        closeMemoModal();
      }
    });

    // Announcement functions
    async function loadAnnouncement() {
      try {
        const response = await fetch('/api/announcements');
        const data = await response.json();
        renderAnnouncement(data.announcement);
      } catch (err) {
        console.error('Failed to load announcement:', err);
      }
    }

    function renderAnnouncement(announcement) {
      const container = document.getElementById('announcementContainer');
      if (!announcement) {
        container.innerHTML = '';
        return;
      }

      container.innerHTML = `
        <div class="announcement-banner">
          <div class="announcement-content">
            <span class="announcement-icon">📢</span>
            <span class="announcement-text">${escapeHtml(announcement.content)}</span>
          </div>
          <button class="announcement-close" onclick="deleteAnnouncement(${announcement.id})">×</button>
        </div>
      `;
    }

    async function submitAnnouncement() {
      const input = document.getElementById('announcementInput');
      const content = input.value.trim();
      
      if (!content) {
        alert('공지사항 내용을 입력하세요.');
        return;
      }

      try {
        const response = await fetch('/api/announcements', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content })
        });

        if (response.ok) {
          input.value = '';
          loadAnnouncement();
        } else {
          alert('공지사항 등록에 실패했습니다.');
        }
      } catch (err) {
        console.error('Failed to save announcement:', err);
        alert('공지사항 등록에 실패했습니다.');
      }
    }

    async function deleteAnnouncement(id) {
      try {
        await fetch(`/api/announcements/${id}`, { method: 'DELETE' });
        loadAnnouncement();
      } catch (err) {
        console.error('Failed to delete announcement:', err);
      }
    }

    // Call member function
    async function callMember(userId, btn) {
      if (!confirm('이 멤버를 호출하시겠습니까?')) return;
      
      btn.classList.add('sending');
      btn.textContent = '전송중...';
      
      try {
        const response = await fetch(`/api/call-member/${userId}`, { method: 'POST' });
        const data = await response.json();
        
        if (response.ok) {
          btn.textContent = '✓ 전송완료';
          setTimeout(() => {
            btn.textContent = '📢 호출';
            btn.classList.remove('sending');
          }, 2000);
        } else {
          alert(data.error || '호출에 실패했습니다.');
          btn.textContent = '📢 호출';
          btn.classList.remove('sending');
        }
      } catch (err) {
        console.error('Failed to call member:', err);
        alert('호출에 실패했습니다.');
        btn.textContent = '📢 호출';
        btn.classList.remove('sending');
      }
    }

    // Load announcement on page load
    loadAnnouncement();
  </script>
</body>
</html>
