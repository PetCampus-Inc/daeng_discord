<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knockdog Check-in</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
  />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-from: #fef9f3;
      --bg-to: #fff5eb;
      --ink: #1f2937;
      --ink-soft: #475569;
      --ink-mute: #94a3b8;
      --line: #f1ddc4;
      --card: #ffffff;
      --accent: #f59e0b;
      --accent-strong: #ea580c;
      --accent-soft: #fef3c7;
      --good: #16a34a;
      --warn: #dc2626;
      --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.05);
      --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.08);
      --shadow-lg: 0 20px 50px rgba(234, 88, 12, 0.18);
    }

    body {
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(1100px 700px at 90% -10%, #ffe1bf 0%, transparent 60%),
        radial-gradient(900px 600px at -10% 110%, #ffe4cc 0%, transparent 55%),
        linear-gradient(180deg, var(--bg-from) 0%, var(--bg-to) 100%);
      min-height: 100vh;
      color: var(--ink);
      padding: 28px 24px 80px;
      overflow-x: hidden;
    }

    .container { max-width: 1180px; margin: 0 auto; }

    /* Top bar */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      gap: 16px;
      flex-wrap: wrap;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--ink);
    }
    .brand-mark {
      width: 36px; height: 36px;
      border-radius: 12px;
      background: linear-gradient(135deg, #fbbf24, #ea580c);
      display: grid; place-items: center;
      box-shadow: 0 4px 12px rgba(234, 88, 12, 0.35);
    }
    .brand-mark img {
      width: 22px; height: 22px; object-fit: contain;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
    }
    .top-meta {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 8px;
      background: #fff;
      padding: 8px 14px;
      border-radius: 999px;
      box-shadow: var(--shadow-sm);
      font-size: 0.88rem;
      color: var(--ink-soft);
      font-weight: 500;
    }
    .chip-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--good); }
    .clock { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--ink); }

    /* Hero */
    .hero {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 24px;
      align-items: stretch;
      margin-bottom: 28px;
    }
    @media (max-width: 900px) { .hero { grid-template-columns: 1fr; } }

    .hero-card {
      background: linear-gradient(135deg, #fff6e8 0%, #ffe9cf 100%);
      border-radius: 24px;
      padding: 32px 32px 28px;
      box-shadow: var(--shadow-md);
      position: relative;
      overflow: hidden;
    }
    .hero-card::after {
      content: ""; position: absolute; right: -40px; bottom: -40px;
      width: 220px; height: 220px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.6), transparent 60%);
      pointer-events: none;
    }
    .greet-eyebrow {
      font-size: 0.85rem; color: var(--accent-strong); font-weight: 600;
      letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 8px;
    }
    .greet-title {
      font-size: 2rem; font-weight: 800; line-height: 1.25; color: var(--ink);
    }
    .greet-title em { color: var(--accent-strong); font-style: normal; }
    .greet-sub {
      margin-top: 12px; color: var(--ink-soft); font-size: 0.98rem; line-height: 1.55;
    }
    .hero-emoji {
      position: absolute; top: 24px; right: 28px;
      width: 78px; height: 78px;
      background: #fff; border-radius: 24px;
      display: grid; place-items: center;
      box-shadow: 0 10px 24px rgba(234, 88, 12, 0.18);
      font-size: 2.4rem;
    }

    /* Quick links — re-uses brand assets from legacy page */
    .quick-card {
      background: #fff; border-radius: 24px;
      padding: 20px 22px;
      box-shadow: var(--shadow-md);
      display: flex; flex-direction: column;
      gap: 14px;
    }
    .quick-card h3 {
      font-size: 0.92rem; color: var(--ink-soft); font-weight: 600;
      letter-spacing: 0.02em;
    }
    .quick-links {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .quick-link {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #faf6f0;
      border: 1px solid #f1e6d4;
      text-decoration: none;
      color: var(--ink);
      font-size: 0.85rem; font-weight: 500;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
    }
    .quick-link:hover { transform: translateY(-2px); background: #fff; box-shadow: var(--shadow-sm); }
    .quick-link img { width: 18px; height: 18px; object-fit: contain; }

    /* Check-in form */
    .checkin-card {
      background: #fff; border-radius: 28px;
      padding: 32px 32px 28px;
      box-shadow: var(--shadow-lg);
      border: 1px solid #fde7c8;
    }
    .checkin-head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
      margin-bottom: 22px;
    }
    .checkin-head h2 {
      font-size: 1.45rem; font-weight: 800; color: var(--ink);
      display: flex; align-items: center; gap: 10px;
    }
    .badge {
      font-size: 0.8rem; padding: 6px 12px;
      background: var(--accent-soft); color: var(--accent-strong);
      border-radius: 999px; font-weight: 600;
    }

    .field { margin-bottom: 20px; }
    .field-label {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.92rem; font-weight: 600; color: var(--ink);
      margin-bottom: 8px;
    }
    .field-label .hint {
      font-size: 0.78rem; color: var(--ink-mute); font-weight: 500;
    }

    .input, .select, .textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1.5px solid #ecdbc1;
      background: #fffdfa;
      font: inherit; color: var(--ink);
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    .input:focus, .select:focus, .textarea:focus {
      outline: none;
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.18);
    }
    .textarea { resize: vertical; min-height: 110px; line-height: 1.55; }

    .row { display: grid; gap: 12px; }
    .row.cols-2 { grid-template-columns: 1fr 1fr; }
    @media (max-width: 600px) { .row.cols-2 { grid-template-columns: 1fr; } }

    .presets {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;
    }
    .preset {
      padding: 6px 12px; border-radius: 999px;
      background: #fef6e7; color: var(--accent-strong);
      border: 1px solid #fde7c8;
      font-size: 0.82rem; font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .15s;
    }
    .preset:hover { background: #fde7c8; transform: translateY(-1px); }

    .mode-group {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .mode-btn {
      padding: 12px 10px; border-radius: 12px;
      background: #faf6f0; border: 1.5px solid #ecdbc1;
      cursor: pointer; font: inherit; color: var(--ink-soft);
      font-weight: 600; font-size: 0.9rem;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      transition: all .15s ease;
    }
    .mode-btn .icon { font-size: 1.3rem; }
    .mode-btn:hover { background: #fff; }
    .mode-btn.active {
      background: linear-gradient(135deg, #ffedd5, #fed7aa);
      border-color: var(--accent);
      color: var(--accent-strong);
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2);
    }

    .mood-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .mood-btn {
      padding: 8px 14px; border-radius: 999px;
      background: #faf6f0; border: 1.5px solid #ecdbc1;
      cursor: pointer; font: inherit; font-size: 0.92rem;
      transition: all .15s ease;
    }
    .mood-btn:hover { background: #fff; }
    .mood-btn.active {
      background: var(--accent-soft);
      border-color: var(--accent);
    }

    /* Team board task rendering */
    .team-tasks {
      font-size: 0.88rem;
      line-height: 1.55;
      white-space: pre-wrap;
      color: var(--ink);
    }
    .team-tasks .jira {
      display: inline-block;
      font-family: 'SF Mono', Menlo, Consolas, monospace;
      font-size: 0.74rem;
      color: var(--accent-strong);
      background: #fef6e7;
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 600;
      margin-right: 2px;
    }

    .submit-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
      margin-top: 12px; padding-top: 20px;
      border-top: 1px dashed #ecdbc1;
    }
    .save-note {
      font-size: 0.82rem; color: var(--ink-mute);
    }
    .save-note.saved { color: var(--good); font-weight: 600; }
    .submit {
      padding: 14px 28px;
      background: linear-gradient(135deg, #fbbf24, #ea580c);
      color: #fff; font-weight: 700; font-size: 1rem;
      border: none; border-radius: 14px; cursor: pointer;
      box-shadow: 0 10px 24px rgba(234, 88, 12, 0.35);
      transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
    }
    .submit:hover { transform: translateY(-2px); box-shadow: 0 14px 28px rgba(234, 88, 12, 0.4); }
    .submit:active { transform: translateY(0); }
    .submit:disabled { filter: grayscale(.4) brightness(.95); cursor: progress; }

    /* Team board */
    .board {
      margin-top: 36px;
      background: #fff; border-radius: 28px;
      padding: 28px 28px 24px;
      box-shadow: var(--shadow-md);
    }
    .board-head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .board-head h2 { font-size: 1.25rem; font-weight: 800; }
    .board-head .meta {
      display: flex; gap: 10px; align-items: center;
      font-size: 0.85rem; color: var(--ink-soft);
    }
    .board-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .team-card {
      background: #fffaf2;
      border: 1px solid #f3e3c8;
      border-radius: 18px;
      padding: 18px 18px 16px;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .team-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
    .team-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .team-name { font-weight: 700; color: var(--ink); }
    .team-time {
      font-size: 0.82rem; color: var(--accent-strong); font-weight: 600;
      background: var(--accent-soft);
      padding: 4px 10px; border-radius: 999px;
    }
    .team-mode {
      display: inline-block; font-size: 0.75rem; color: var(--ink-soft);
      margin-bottom: 8px;
    }
    .team-section { margin-top: 8px; }
    .team-section-label {
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--ink-mute); font-weight: 600; margin-bottom: 4px;
    }
    .team-section-body {
      font-size: 0.88rem; color: var(--ink); white-space: pre-wrap; line-height: 1.5;
    }
    .team-section-body.blocker {
      background: #fef2f2; color: #991b1b;
      border-left: 3px solid #f87171;
      padding: 8px 10px; border-radius: 6px;
    }

    .empty {
      padding: 40px 20px;
      text-align: center; color: var(--ink-mute);
      background: #fffaf2; border: 1px dashed #f1ddc4;
      border-radius: 18px;
    }

    /* Weekly attendance */
    .week-table-wrap { overflow-x: auto; }
    .week-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 0.9rem;
      min-width: 640px;
    }
    .week-table th.weekend, .week-table td.weekend { background: #fbf5ea; }
    .week-table th.weekend .day-head .dow { color: #d97706; }
    .week-table th, .week-table td {
      padding: 12px 10px;
      text-align: center;
      border-bottom: 1px solid #f3e3c8;
    }
    .week-table th:first-child, .week-table td:first-child {
      text-align: left;
      padding-left: 6px;
      font-weight: 600;
    }
    .week-table thead th {
      font-weight: 600;
      color: var(--ink-soft);
      font-size: 0.82rem;
      letter-spacing: 0.02em;
      background: #fffaf2;
      position: sticky; top: 0;
    }
    .week-table th.today {
      color: var(--accent-strong);
      background: #fff1dc;
    }
    .week-table td.today { background: #fffaf2; }
    .day-head { display: flex; flex-direction: column; gap: 2px; line-height: 1.15; }
    .day-head .dow { font-size: 0.72rem; color: var(--ink-mute); }
    .day-head .dom { font-weight: 700; color: var(--ink); }
    .week-table th.today .day-head .dom { color: var(--accent-strong); }
    .day-cell { font-variant-numeric: tabular-nums; }
    .day-mark {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      border-radius: 50%;
      font-size: 0.78rem; font-weight: 600;
    }
    .day-mark.checked {
      background: linear-gradient(135deg, #fde7c8, #fbd9a0);
      color: var(--accent-strong);
      box-shadow: inset 0 0 0 2px #f59e0b40;
    }
    .day-mark.miss { background: #faf6f0; color: #cbd5e1; }
    .week-table .count {
      font-variant-numeric: tabular-nums;
      color: var(--ink-soft);
      font-weight: 600;
      white-space: nowrap;
    }
    .week-meta {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      font-size: 0.85rem; color: var(--ink-soft);
    }
    .week-nav {
      display: inline-flex; gap: 4px; align-items: center;
      background: #fffaf2; border: 1px solid #ecdbc1;
      border-radius: 10px; padding: 4px;
    }
    .week-nav button {
      background: none; border: none; cursor: pointer;
      padding: 4px 10px; border-radius: 6px;
      font: inherit; font-size: 0.85rem; color: var(--ink-soft);
    }
    .week-nav button:hover { background: #fff; color: var(--ink); }
    .week-nav .label { padding: 4px 8px; font-weight: 600; color: var(--ink); }

    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #1f2937; color: #fff;
      padding: 12px 22px; border-radius: 12px;
      font-weight: 600; font-size: 0.92rem;
      box-shadow: 0 12px 30px rgba(0,0,0,0.2);
      opacity: 0; transition: opacity .3s, transform .3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

  </style>
</head>
<body>
  <div class="container">
    <!-- Top bar -->
    <div class="top-bar">
      <div class="brand">
        <div class="brand-mark">
          <img
            src="https://home.knockdog.net/favicon.ico"
            alt="Knockdog"
            onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22white%22><path d=%22M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z%22/></svg>'"
          />
        </div>
        <span>Knockdog · Daily Check-in</span>
      </div>
      <div class="top-meta">
        <span class="chip"><span class="chip-dot"></span><span id="dateLabel">—</span></span>
        <span class="chip clock" id="clockLabel">--:--:--</span>
      </div>
    </div>

    <!-- Hero -->
    <section class="hero">
      <div class="hero-card">
        <div class="hero-emoji">🐶</div>
        <div class="greet-eyebrow" id="greetEyebrow">Good morning</div>
        <h1 class="greet-title">
          오늘도 <em>가볍게</em> 시작해볼까요?<br />
          작업 전, 하루를 정리해요.
        </h1>
        <p class="greet-sub">
          체크인을 하면 동료들도 오늘 누가 무엇을 할지 한 눈에 볼 수 있어요.<br />
          블락커가 있다면 솔직하게 적어두세요 — 누군가 도와줄 수 있어요.
        </p>
      </div>

      <aside class="quick-card">
        <h3>자주 쓰는 도구</h3>
        <div class="quick-links">
          <a class="quick-link" target="_blank" href="https://jira-knockdog.atlassian.net/jira/your-work">
            <img src="https://cdn.worldvectorlogo.com/logos/jira-1.svg" alt="Jira" />Jira
          </a>
          <a class="quick-link" target="_blank" href="https://www.notion.so/2de6c15f67fb8039b0f7e6e9c7fe202f?v=2de6c15f67fb815e809d000ce19fbfe7">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/45/Notion_app_logo.png" alt="Notion" />Notion
          </a>
          <a class="quick-link" target="_blank" href="https://www.figma.com/">
            <img src="https://cdn.worldvectorlogo.com/logos/figma-icon.svg" alt="Figma" />Figma
          </a>
          <a class="quick-link" target="_blank" href="https://home.knockdog.net/">
            <img
              src="https://home.knockdog.net/favicon.ico"
              alt="Home"
              onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%23f59e0b%22><path d=%22M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z%22/></svg>'"
            />Home
          </a>
          <a class="quick-link" target="_blank" href="https://api.knockdog.net/swagger-ui/index.html">
            <img src="https://static1.smartbear.co/swagger/media/assets/images/swagger_logo.svg" alt="Swagger" />Swagger
          </a>
          <a class="quick-link" target="_blank" href="https://aws.amazon.com/console/">
            <img
              src="https://a0.awsstatic.com/libra-css/images/logos/aws_smile-header-desktop-en-white_59x35.png"
              alt="AWS"
              style="background:#232f3e; padding:2px; border-radius:4px;"
            />AWS
          </a>
        </div>
      </aside>
    </section>

    <!-- Check-in form -->
    <section class="checkin-card">
      <div class="checkin-head">
        <h2>오늘의 체크인</h2>
        <span class="badge" id="todayBadge">—</span>
      </div>

      <div class="field">
        <label class="field-label">
          이름
          <span class="hint">한 번 입력하면 다음에도 자동으로 불러와요</span>
        </label>
        <input class="input" id="userName" placeholder="예: 진요" autocomplete="off" />
      </div>

      <div class="field">
        <label class="field-label">
          오늘 작업 시간
          <span class="hint">형식: 10:00-19:00 (또는 10-19, 10:30~19:30)</span>
        </label>
        <input class="input" id="workHours" type="text" placeholder="10:00-19:00" autocomplete="off" />
        <div class="presets" id="timePresets">
          <button class="preset" type="button" data-hours="09:00-18:00">9-18</button>
          <button class="preset" type="button" data-hours="10:00-19:00">10-19</button>
          <button class="preset" type="button" data-hours="10:30-19:30">10:30-19:30</button>
          <button class="preset" type="button" data-hours="13:00-22:00">오후 시작</button>
        </div>
      </div>

      <div class="field">
        <label class="field-label">
          오늘 할 일
          <span class="hint">자유롭게 작성. Jira 티켓이 있으면 키를 같이 적어주세요 (예: KDQA-1234)</span>
        </label>
        <textarea
          class="textarea"
          id="tasks"
          placeholder="KDQA-1234 결제 모듈 PR 리뷰&#10;디자인 싱크 참여&#10;1on1 준비"
          style="min-height: 130px;"
        ></textarea>
      </div>

      <div class="field">
        <label class="field-label">
          Blockers
          <span class="hint">없으면 비워두세요</span>
        </label>
        <textarea
          class="textarea"
          id="blockers"
          placeholder="e.g. Payment API spec not finalized — blocked, need @backend"
          style="min-height: 80px;"
        ></textarea>
      </div>

      <div class="submit-row">
        <span class="save-note" id="saveNote">아직 저장되지 않음</span>
        <button class="submit" id="submitBtn" type="button">오늘 체크인 ✨</button>
      </div>
    </section>

    <!-- Team board -->
    <section class="board">
      <div class="board-head">
        <h2>오늘의 팀 보드</h2>
        <div class="meta">
          <span id="teamCount">0명 체크인</span>
          <button
            class="preset"
            type="button"
            id="refreshBtn"
            style="background:#fff; color:var(--ink-soft); border-color:#ecdbc1;"
          >새로고침</button>
        </div>
      </div>
      <div id="teamBoard"></div>
    </section>

    <!-- Weekly attendance -->
    <section class="board" style="margin-top: 22px;">
      <div class="board-head">
        <h2>주간 출석</h2>
        <div class="week-meta">
          <div class="week-nav">
            <button type="button" id="weekPrev">← 이전</button>
            <span class="label" id="weekLabel">—</span>
            <button type="button" id="weekNext">다음 →</button>
            <button type="button" id="weekToday">이번 주</button>
          </div>
        </div>
      </div>
      <div id="weekBoard"></div>
    </section>

  </div>

  <div class="toast" id="toast">저장되었습니다 ✨</div>

  <script>
    /* ---------------- Time + greeting ---------------- */
    const pad = (n) => String(n).padStart(2, "0");

    function tickClock() {
      const now = new Date();
      const dateLabel = now.toLocaleDateString("ko-KR", {
        year: "numeric", month: "long", day: "numeric", weekday: "long",
      });
      document.getElementById("dateLabel").textContent = dateLabel;
      document.getElementById("clockLabel").textContent =
        `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      document.getElementById("todayBadge").textContent =
        `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;

      const h = now.getHours();
      const eyebrow =
        h < 6 ? "Late night" :
        h < 12 ? "Good morning" :
        h < 18 ? "Good afternoon" : "Good evening";
      document.getElementById("greetEyebrow").textContent = eyebrow;
    }
    tickClock();
    setInterval(tickClock, 1000);

    /* ---------------- State ---------------- */
    const STORAGE_USER = "knockdog_user";

    /* ---------------- Time parsing ---------------- */
    const TIME_RANGE_RE = /^\s*(\d{1,2})(?::(\d{2}))?\s*[-~–—]\s*(\d{1,2})(?::(\d{2}))?\s*$/;
    function parseWorkHours(text) {
      const m = (text || "").match(TIME_RANGE_RE);
      if (!m) return null;
      const sh = Number(m[1]);
      const sm = Number(m[2] || 0);
      const eh = Number(m[3]);
      const em = Number(m[4] || 0);
      if (sh > 24 || eh > 24 || sm > 59 || em > 59) return null;
      const pad = (n) => String(n).padStart(2, "0");
      return { startTime: `${pad(sh)}:${pad(sm)}`, endTime: `${pad(eh)}:${pad(em)}` };
    }
    function formatRange(startTime, endTime) {
      if (!startTime && !endTime) return "";
      return `${startTime || ""}-${endTime || ""}`;
    }

    /* ---------------- Time presets ---------------- */
    document.getElementById("timePresets").addEventListener("click", (e) => {
      const btn = e.target.closest(".preset");
      if (!btn) return;
      document.getElementById("workHours").value = btn.dataset.hours;
    });

    /* ---------------- Username persistence ---------------- */
    const userInput = document.getElementById("userName");
    const savedUser = localStorage.getItem(STORAGE_USER) || "";
    if (savedUser) {
      userInput.value = savedUser;
      prefillFromServer(savedUser);
    }
    userInput.addEventListener("change", () => {
      const v = userInput.value.trim();
      if (v) {
        localStorage.setItem(STORAGE_USER, v);
        prefillFromServer(v);
      }
    });

    /* ---------------- Prefill from server ---------------- */
    async function prefillFromServer(userName) {
      try {
        const r = await fetch(`/api/checkin/me?userName=${encodeURIComponent(userName)}`);
        const data = await r.json();
        if (!data.checkin) return;
        const c = data.checkin;
        const range = formatRange(c.startTime, c.endTime);
        if (range) document.getElementById("workHours").value = range;
        if (c.tasks) document.getElementById("tasks").value = c.tasks;
        if (c.blockers) document.getElementById("blockers").value = c.blockers;
        markSaved("오늘 이미 체크인했어요. 수정 가능합니다.");
      } catch (e) { /* silent */ }
    }

    /* ---------------- Submit ---------------- */
    const submitBtn = document.getElementById("submitBtn");
    submitBtn.addEventListener("click", async () => {
      const userName = userInput.value.trim();
      const workHoursEl = document.getElementById("workHours");
      const tasks = document.getElementById("tasks").value.trim();
      const blockers = document.getElementById("blockers").value.trim();

      if (!userName) { toast("이름을 입력해주세요"); userInput.focus(); return; }
      const parsed = parseWorkHours(workHoursEl.value);
      if (!parsed) {
        toast("작업 시간 형식을 확인해주세요 (예: 10:00-19:00)");
        workHoursEl.focus();
        return;
      }
      const { startTime, endTime } = parsed;

      localStorage.setItem(STORAGE_USER, userName);
      submitBtn.disabled = true;
      submitBtn.textContent = "저장 중...";

      try {
        const r = await fetch("/api/checkin", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ userName, startTime, endTime, tasks, blockers }),
        });
        if (!r.ok) throw new Error((await r.json()).error || "fail");
        toast("체크인 완료! 좋은 하루 보내세요 ☀️");
        markSaved(`${new Date().toLocaleTimeString("ko-KR")} 에 저장됨`);
        loadBoard();
        loadWeek();
      } catch (e) {
        toast("저장 실패: " + e.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "오늘 체크인 ✨";
      }
    });

    function markSaved(text) {
      const note = document.getElementById("saveNote");
      note.textContent = text;
      note.classList.add("saved");
    }

    /* ---------------- Toast ---------------- */
    let toastTimer = null;
    function toast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
    }

    /* ---------------- Team board ---------------- */
    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      })[c]);
    }
    function highlightJira(text) {
      return esc(text).replace(
        /\b([A-Z][A-Z0-9]+-\d+)\b/g,
        '<span class="jira">$1</span>'
      );
    }
    async function loadBoard() {
      const board = document.getElementById("teamBoard");
      board.innerHTML = `<div class="empty">불러오는 중...</div>`;
      try {
        const r = await fetch("/api/checkin/today");
        const data = await r.json();
        const list = data.checkins || [];
        document.getElementById("teamCount").textContent = `${list.length}명 체크인`;
        if (!list.length) {
          board.innerHTML = `<div class="empty">아직 아무도 체크인하지 않았어요.<br/>첫 체크인을 남겨보세요! 🐶</div>`;
          return;
        }
        board.innerHTML = `<div class="board-grid">${list
          .map((c) => {
            const tasksHtml = c.tasks
              ? `<div class="team-tasks">${highlightJira(c.tasks)}</div>`
              : "";
            return `
            <div class="team-card">
              <div class="team-head">
                <span class="team-name">${esc(c.userName)}</span>
                <span class="team-time">${esc(c.startTime || "")} – ${esc(c.endTime || "")}</span>
              </div>
              ${tasksHtml ? `
                <div class="team-section">
                  <div class="team-section-label">오늘 할 일</div>
                  ${tasksHtml}
                </div>` : ""}
              ${c.blockers ? `
                <div class="team-section">
                  <div class="team-section-label">Blockers</div>
                  <div class="team-section-body blocker">${esc(c.blockers)}</div>
                </div>` : ""}
            </div>`;
          })
          .join("")}</div>`;
      } catch (e) {
        board.innerHTML = `<div class="empty">불러오기 실패: ${esc(e.message)}</div>`;
      }
    }
    document.getElementById("refreshBtn").addEventListener("click", loadBoard);
    loadBoard();
    setInterval(loadBoard, 60_000);

    /* ---------------- Weekly attendance ---------------- */
    let viewWeekStart = null; // YYYY-MM-DD (Monday) override; null = current week
    const DOW_KR = ["월", "화", "수", "목", "금", "토", "일"];

    function shiftWeek(baseISO, weeks) {
      const d = new Date(baseISO + "T00:00:00Z");
      d.setUTCDate(d.getUTCDate() + weeks * 7);
      return d.toISOString().slice(0, 10);
    }

    async function loadWeek() {
      const board = document.getElementById("weekBoard");
      board.innerHTML = `<div class="empty">불러오는 중...</div>`;
      const url = viewWeekStart
        ? `/api/checkin/week?weekStart=${viewWeekStart}`
        : "/api/checkin/week";
      try {
        const r = await fetch(url);
        const data = await r.json();
        const { weekStart, dates, users } = data;
        viewWeekStart = weekStart;
        document.getElementById("weekLabel").textContent = `${weekStart} 주차`;

        const todayStr = document.getElementById("todayBadge").textContent;
        const head = `
          <thead><tr>
            <th>멤버</th>
            ${dates
              .map((d, i) => {
                const dom = d.slice(8);
                const isToday = d === todayStr;
                const isWeekend = i >= 5;
                return `<th class="${isToday ? "today" : ""} ${isWeekend ? "weekend" : ""}">
                  <div class="day-head">
                    <span class="dow">${DOW_KR[i]}</span>
                    <span class="dom">${dom}</span>
                  </div>
                </th>`;
              })
              .join("")}
            <th>합계</th>
          </tr></thead>`;

        if (!users.length) {
          board.innerHTML = `<div class="week-table-wrap"><table class="week-table">${head}</table></div>
            <div class="empty" style="margin-top:14px;">이번 주에 체크인한 기록이 없어요.</div>`;
          return;
        }

        const body = users
          .map((u) => {
            const dateSet = new Set(u.entries.map((e) => e.date));
            const cells = dates
              .map((d, i) => {
                const isToday = d === todayStr;
                const isWeekend = i >= 5;
                const entry = u.entries.find((e) => e.date === d);
                const checked = !!entry;
                const dom = d.slice(8);
                const tip = entry
                  ? `${d} · ${entry.startTime || ""}–${entry.endTime || ""}`
                  : `${d} · 미체크인`;
                return `<td class="day-cell ${isToday ? "today" : ""} ${isWeekend ? "weekend" : ""}">
                  <span class="day-mark ${checked ? "checked" : "miss"}" title="${esc(tip)}">${
                  checked ? dom : "·"
                }</span>
                </td>`;
              })
              .join("");
            return `<tr>
              <td>${esc(u.userName)}</td>
              ${cells}
              <td class="count">${dateSet.size} / ${dates.length}</td>
            </tr>`;
          })
          .join("");

        board.innerHTML = `
          <div class="week-table-wrap">
            <table class="week-table">
              ${head}
              <tbody>${body}</tbody>
            </table>
          </div>`;
      } catch (e) {
        board.innerHTML = `<div class="empty">불러오기 실패: ${esc(e.message)}</div>`;
      }
    }
    document.getElementById("weekPrev").addEventListener("click", () => {
      if (!viewWeekStart) return;
      viewWeekStart = shiftWeek(viewWeekStart, -1);
      loadWeek();
    });
    document.getElementById("weekNext").addEventListener("click", () => {
      if (!viewWeekStart) return;
      viewWeekStart = shiftWeek(viewWeekStart, 1);
      loadWeek();
    });
    document.getElementById("weekToday").addEventListener("click", () => {
      viewWeekStart = null;
      loadWeek();
    });
    loadWeek();
  </script>
</body>
</html>
