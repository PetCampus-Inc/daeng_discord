<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Core Sync Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #2c1810 0%, #4a2c2a 50%, #1a1412 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* Snowfall Effect */
    .snowflakes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
      overflow: hidden;
    }

    .snowflake {
      position: absolute;
      top: -20px;
      color: #fff;
      font-size: 1rem;
      text-shadow: 0 0 5px rgba(255,255,255,0.8);
      animation: fall linear infinite;
      opacity: 0.8;
    }

    @keyframes fall {
      0% {
        transform: translateY(-10px) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.8;
      }
      90% {
        opacity: 0.6;
      }
      100% {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }

    .snowflake:nth-child(1) { left: 5%; animation-duration: 8s; animation-delay: 0s; font-size: 0.8rem; }
    .snowflake:nth-child(2) { left: 15%; animation-duration: 10s; animation-delay: 1s; font-size: 1.2rem; }
    .snowflake:nth-child(3) { left: 25%; animation-duration: 9s; animation-delay: 2s; font-size: 0.9rem; }
    .snowflake:nth-child(4) { left: 35%; animation-duration: 11s; animation-delay: 0.5s; font-size: 1rem; }
    .snowflake:nth-child(5) { left: 45%; animation-duration: 8s; animation-delay: 3s; font-size: 1.1rem; }
    .snowflake:nth-child(6) { left: 55%; animation-duration: 12s; animation-delay: 1.5s; font-size: 0.7rem; }
    .snowflake:nth-child(7) { left: 65%; animation-duration: 9s; animation-delay: 2.5s; font-size: 1.3rem; }
    .snowflake:nth-child(8) { left: 75%; animation-duration: 10s; animation-delay: 0.2s; font-size: 0.85rem; }
    .snowflake:nth-child(9) { left: 85%; animation-duration: 11s; animation-delay: 1.8s; font-size: 1rem; }
    .snowflake:nth-child(10) { left: 95%; animation-duration: 8s; animation-delay: 3.5s; font-size: 0.9rem; }
    .snowflake:nth-child(11) { left: 10%; animation-duration: 13s; animation-delay: 4s; font-size: 1.1rem; }
    .snowflake:nth-child(12) { left: 30%; animation-duration: 9s; animation-delay: 5s; font-size: 0.75rem; }
    .snowflake:nth-child(13) { left: 50%; animation-duration: 10s; animation-delay: 4.5s; font-size: 1.2rem; }
    .snowflake:nth-child(14) { left: 70%; animation-duration: 12s; animation-delay: 6s; font-size: 0.8rem; }
    .snowflake:nth-child(15) { left: 90%; animation-duration: 11s; animation-delay: 5.5s; font-size: 1rem; }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 2.5rem;
      background: linear-gradient(90deg, #f4a261 0%, #e76f51 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
      background: rgba(255,255,255,0.1);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff6b6b;
    }

    .status-dot.connected {
      background: #51cf66;
    }

    .week-nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .week-nav button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      transition: background 0.3s;
    }

    .week-nav button:hover {
      background: rgba(255,255,255,0.2);
    }

    .week-nav button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .week-label {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #f4a261;
    }

    .stat-label {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.7);
      margin-top: 5px;
    }

    .chart-container {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 25px;
      margin-bottom: 30px;
    }

    .chart-title {
      font-size: 1.2rem;
      margin-bottom: 20px;
      color: rgba(255,255,255,0.9);
    }

    .chart-wrapper {
      position: relative;
      height: 300px;
    }

    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .member-card {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .member-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .member-card.met {
      border-left: 4px solid #51cf66;
    }

    .member-card.not-met {
      border-left: 4px solid #ff6b6b;
    }

    .member-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 15px;
    }

    .member-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
    }

    .member-info h3 {
      font-size: 1.1rem;
      margin-bottom: 3px;
    }

    .member-info span {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
    }

    .progress-container {
      margin-bottom: 15px;
    }

    .progress-bar {
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .progress-fill.complete {
      background: linear-gradient(90deg, #51cf66, #40c057);
    }

    .progress-fill.incomplete {
      background: linear-gradient(90deg, #ff6b6b, #fa5252);
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.9rem;
    }

    .week-calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-top: 10px;
    }

    .week-calendar-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 4px;
    }

    .day-label {
      font-size: 0.65rem;
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
    }

    .day-cell {
      aspect-ratio: 1;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.4);
      transition: all 0.3s;
    }

    .day-cell.synced {
      background: linear-gradient(135deg, rgba(81, 207, 102, 0.3), rgba(81, 207, 102, 0.5));
      color: #51cf66;
      font-weight: 600;
    }

    .day-cell.synced::after {
      content: '✓';
      font-size: 0.9rem;
      margin-top: 2px;
    }

    .day-cell.today {
      border: 2px solid #f4a261;
    }

    .day-cell.future {
      opacity: 0.3;
    }

    .day-number {
      font-size: 0.75rem;
      font-weight: 600;
    }

    .sync-days {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .sync-day {
      font-size: 0.75rem;
      padding: 4px 8px;
      background: rgba(244, 162, 97, 0.3);
      border-radius: 4px;
      color: #f4a261;
    }

    .loading {
      text-align: center;
      padding: 50px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #f4a261;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message {
      background: rgba(255, 107, 107, 0.2);
      border: 1px solid #ff6b6b;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin: 20px 0;
    }

    .refresh-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #f4a261 0%, #e76f51 100%);
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(244, 162, 97, 0.4);
      transition: transform 0.3s;
    }

    .refresh-btn:hover {
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <!-- Snowfall Effect -->
  <div class="snowflakes">
    <div class="snowflake">❄</div>
    <div class="snowflake">❅</div>
    <div class="snowflake">❆</div>
    <div class="snowflake">❄</div>
    <div class="snowflake">❅</div>
    <div class="snowflake">❆</div>
    <div class="snowflake">❄</div>
    <div class="snowflake">❅</div>
    <div class="snowflake">❆</div>
    <div class="snowflake">❄</div>
    <div class="snowflake">❅</div>
    <div class="snowflake">❆</div>
    <div class="snowflake">❄</div>
    <div class="snowflake">❅</div>
    <div class="snowflake">❆</div>
  </div>

  <div class="container">
    <header>
      <h1>Core Sync Dashboard</h1>
      <div class="status-badge">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">연결 확인 중...</span>
      </div>
    </header>

    <div class="week-nav">
      <button id="prevWeek">← 이전 주</button>
      <span class="week-label" id="weekLabel">-</span>
      <button id="nextWeek">다음 주 →</button>
    </div>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p>데이터 로딩 중...</p>
      </div>
    </div>
  </div>

  <button class="refresh-btn" onclick="loadData()" title="새로고침">↻</button>

  <script>
    let currentWeekOffset = 0;
    let chart = null;

    async function loadData() {
      const content = document.getElementById('content');
      content.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <p>데이터 로딩 중...</p>
        </div>
      `;

      try {
        const response = await fetch(`/api/sync-data?weekOffset=${currentWeekOffset}`);
        const data = await response.json();

        updateStatus(data.botConnected);
        document.getElementById('weekLabel').textContent = `${data.weekKey} 주차`;
        document.getElementById('nextWeek').disabled = currentWeekOffset <= 0;

        if (!data.success) {
          throw new Error(data.error || '데이터를 불러올 수 없습니다');
        }

        if (!data.botConnected) {
          const configMsg = data.missingConfig && data.missingConfig.length > 0 
            ? `누락된 환경변수: ${data.missingConfig.join(", ")}`
            : "BOT_TOKEN이 올바른지 확인해주세요.";
          content.innerHTML = `
            <div class="error-message">
              <h3>⚠️ Discord 봇이 연결되지 않았습니다</h3>
              <p style="margin-top: 10px; opacity: 0.8;">${configMsg}</p>
            </div>
          `;
          return;
        }

        if (data.members.length === 0) {
          content.innerHTML = `
            <div class="error-message">
              <h3>📭 데이터가 없습니다</h3>
              <p style="margin-top: 10px; opacity: 0.8;">Core 역할을 가진 멤버가 없거나 채널 ID가 올바르지 않습니다.</p>
            </div>
          `;
          return;
        }

        renderDashboard(data);

      } catch (error) {
        content.innerHTML = `
          <div class="error-message">
            <h3>❌ 오류 발생</h3>
            <p style="margin-top: 10px; opacity: 0.8;">${error.message}</p>
          </div>
        `;
      }
    }

    function updateStatus(connected) {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      
      if (connected) {
        dot.classList.add('connected');
        text.textContent = 'Bot 연결됨';
      } else {
        dot.classList.remove('connected');
        text.textContent = 'Bot 미연결';
      }
    }

    function renderDashboard(data) {
      const members = data.members;
      const metCount = members.filter(m => m.isMet).length;
      const totalSyncs = members.reduce((sum, m) => sum + m.syncCount, 0);
      const avgPercentage = Math.round(members.reduce((sum, m) => sum + m.percentage, 0) / members.length);

      const content = document.getElementById('content');
      content.innerHTML = `
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value">${members.length}</div>
            <div class="stat-label">총 멤버</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color: #51cf66">${metCount}</div>
            <div class="stat-label">기준 충족</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color: #ff6b6b">${members.length - metCount}</div>
            <div class="stat-label">기준 미달</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${avgPercentage}%</div>
            <div class="stat-label">평균 달성률</div>
          </div>
        </div>

        <div class="chart-container">
          <h2 class="chart-title">📊 멤버별 Core Sync 달성 현황</h2>
          <div class="chart-wrapper">
            <canvas id="syncChart"></canvas>
          </div>
        </div>

        <div class="members-grid" id="membersGrid"></div>
      `;

      weekDaysData = data.weekDays || [];
      renderChart(members, data.requiredCount);
      renderMemberCards(members);
    }

    function renderChart(members, requiredCount) {
      const ctx = document.getElementById('syncChart').getContext('2d');
      
      if (chart) {
        chart.destroy();
      }

      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: members.map(m => m.displayName),
          datasets: [{
            label: 'Sync 횟수',
            data: members.map(m => m.syncCount),
            backgroundColor: members.map(m => 
              m.isMet ? 'rgba(81, 207, 102, 0.8)' : 'rgba(255, 107, 107, 0.8)'
            ),
            borderColor: members.map(m => 
              m.isMet ? '#51cf66' : '#ff6b6b'
            ),
            borderWidth: 2,
            borderRadius: 6,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: false
            },
            tooltip: {
              backgroundColor: 'rgba(0,0,0,0.8)',
              titleColor: '#fff',
              bodyColor: '#fff',
              padding: 12,
              cornerRadius: 8,
              callbacks: {
                label: (context) => {
                  const member = members[context.dataIndex];
                  return `${member.syncCount} / ${requiredCount} (${member.percentage}%)`;
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              max: Math.max(requiredCount + 1, Math.max(...members.map(m => m.syncCount)) + 1),
              ticks: {
                color: 'rgba(255,255,255,0.6)',
                stepSize: 1
              },
              grid: {
                color: 'rgba(255,255,255,0.1)'
              }
            },
            x: {
              ticks: {
                color: 'rgba(255,255,255,0.6)'
              },
              grid: {
                display: false
              }
            }
          }
        }
      });
    }

    let weekDaysData = [];
    const DAY_NAMES = ['월', '화', '수', '목', '금', '토', '일'];

    function renderMemberCards(members) {
      const grid = document.getElementById('membersGrid');
      const today = new Date().toISOString().slice(0, 10);
      
      grid.innerHTML = members.map(member => `
        <div class="member-card ${member.isMet ? 'met' : 'not-met'}">
          <div class="member-header">
            <img src="${member.avatar}" alt="${member.displayName}" class="member-avatar" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23f4a261%22 width=%22100%22 height=%22100%22/><text fill=%22white%22 font-size=%2240%22 x=%2250%22 y=%2260%22 text-anchor=%22middle%22>${member.displayName.charAt(0)}</text></svg>'">
            <div class="member-info">
              <h3>${member.displayName}</h3>
              <span>@${member.username}</span>
            </div>
          </div>
          <div class="progress-container">
            <div class="progress-bar">
              <div class="progress-fill ${member.isMet ? 'complete' : 'incomplete'}" style="width: ${Math.min(member.percentage, 100)}%"></div>
            </div>
            <div class="progress-text">
              <span>${member.syncCount} / ${member.requiredCount}</span>
              <span>${member.percentage}%</span>
            </div>
          </div>
          <div class="week-calendar-header">
            ${DAY_NAMES.map(name => `<div class="day-label">${name}</div>`).join('')}
          </div>
          <div class="week-calendar">
            ${weekDaysData.map(day => {
              const isSynced = member.days.includes(day);
              const isToday = day === today;
              const isFuture = day > today;
              const dayNum = day.slice(8, 10);
              return `<div class="day-cell ${isSynced ? 'synced' : ''} ${isToday ? 'today' : ''} ${isFuture ? 'future' : ''}">
                <span class="day-number">${parseInt(dayNum)}</span>
              </div>`;
            }).join('')}
          </div>
        </div>
      `).join('');
    }

    document.getElementById('prevWeek').addEventListener('click', () => {
      currentWeekOffset++;
      loadData();
    });

    document.getElementById('nextWeek').addEventListener('click', () => {
      if (currentWeekOffset > 0) {
        currentWeekOffset--;
        loadData();
      }
    });

    loadData();
    setInterval(loadData, 60000);
  </script>
</body>
</html>
